name: CI

on:
  push:
    branches: [main, "release-candidate/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run check
      - run: npm test
      - run: npm run smoke
      - run: npm run package:smoke
